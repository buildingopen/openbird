<svg xmlns="http://www.w3.org/2000/svg" width="860" height="580" viewBox="0 0 860 580">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="860" height="580" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Terminal window -->
  <rect width="860" height="580" rx="12" fill="url(#termBg)" clip-path="url(#rounded)"/>

  <!-- Title bar -->
  <rect width="860" height="44" rx="0" fill="#21262d"/>
  <rect width="860" height="44" rx="12" fill="#21262d"/>
  <rect y="22" width="860" height="22" fill="#21262d"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="7" fill="#ff5f57"/>
  <circle cx="42" cy="22" r="7" fill="#febc2e"/>
  <circle cx="64" cy="22" r="7" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="430" y="28" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="13" fill="#8b949e" text-anchor="middle">Claude Code — /analyze-rejection</text>

  <!-- Separator line -->
  <line x1="0" y1="44" x2="860" y2="44" stroke="#30363d" stroke-width="1"/>

  <!-- Content area -->
  <!-- Prompt line -->
  <text x="24" y="80" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="13" fill="#3fb950">❯</text>
  <text x="40" y="80" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="13" fill="#e6edf3">/analyze-rejection</text>

  <!-- Blank line before paste -->
  <text x="24" y="106" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#484f58">Paste the airline rejection letter below. Type END on its own line when done.</text>

  <!-- Pasted rejection text block -->
  <rect x="14" y="118" width="832" height="88" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="26" y="138" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#8b949e">Subject: RE: Compensation Claim — Booking REF #LV4829K</text>
  <text x="26" y="156" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#e6edf3">Dear passenger, after careful review we regret to inform you that your claim</text>
  <text x="26" y="172" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#e6edf3">for compensation cannot be approved. You arrived at your final destination</text>
  <text x="26" y="188" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#e6edf3">earlier than your original scheduled arrival time. No compensation is owed.</text>

  <!-- END marker -->
  <text x="24" y="222" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="13" fill="#484f58">END</text>

  <!-- Separator -->
  <line x1="14" y1="238" x2="846" y2="238" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Analysis output -->
  <!-- VERDICT line -->
  <rect x="14" y="250" width="832" height="28" rx="4" fill="#0f2a1a"/>
  <text x="26" y="270" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#3fb950">VERDICT: REJECTION INVALID — Airline applied the wrong article.</text>

  <!-- Classification -->
  <text x="24" y="302" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#58a6ff">CLASSIFICATION</text>
  <text x="24" y="320" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#e6edf3">  Disruption type: <tspan fill="#f0883e">CANCELLATION</tspan> (Art. 5) — original BER→BCN flight not operated.</text>
  <text x="24" y="338" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#e6edf3">  Passenger rerouted to alternative flight departing 8.5h before original.</text>

  <!-- Airline argument -->
  <text x="24" y="366" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#58a6ff">AIRLINE'S ARGUMENT</text>
  <text x="24" y="384" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#e6edf3">  "You arrived earlier, so no compensation is owed."</text>
  <text x="24" y="402" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#ff7b72">  ✗ WRONG — Art. 6 "earlier arrival" defense does not apply to Art. 5 cancellations.</text>
  <text x="24" y="420" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#ff7b72">  ✗ Art. 5(1)(c)(iii) requires new departure ≤1h before original. 8.5h fails entirely.</text>

  <!-- What you're owed -->
  <text x="24" y="450" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#58a6ff">WHAT YOU ARE OWED</text>
  <text x="24" y="468" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#3fb950">  ✓ Art. 7(1)(c) statutory compensation: <tspan font-weight="bold">€600</tspan> (route &gt;3,500 km)</text>
  <text x="24" y="486" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#3fb950">  ✓ Art. 9 care costs: hotel + meals (owed regardless of cause)</text>

  <!-- Next steps -->
  <text x="24" y="516" font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace" font-size="12" fill="#8b949e">Run /file-claim to draft your counter-letter  ·  Run /escalate to file with AESA</text>

  <!-- Cursor blink -->
  <rect x="24" y="548" width="8" height="16" rx="1" fill="#58a6ff" opacity="0.8"/>
</svg>
